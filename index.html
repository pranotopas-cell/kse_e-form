<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KSE - Documents Integrated System</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        :root { 
            --kse-dark: #0a1f08; 
            --kse-primary: #143610; 
            --kse-accent: #27ae60; 
            --kse-orange: #f39c12;
            --sidebar-width: 280px;
        }

        body { font-family: 'Inter', sans-serif; background-color: #f0f2f5; margin: 0; }

        /* --- LOGIN PAGE --- */
        #login-page { 
            height: 100vh; display: flex; align-items: center; justify-content: center; 
            background: linear-gradient(rgba(10, 31, 8, 0.8), rgba(10, 31, 8, 0.8)), url('https://images.unsplash.com/photo-1497366216548-37526070297c?auto=format&fit=crop&q=80'); 
            background-size: cover; background-position: center;
        }
        .login-card { 
            background: rgba(255, 255, 255, 0.95); padding: 3.5rem; border-radius: 1.5rem; 
            width: 100%; max-width: 450px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); backdrop-filter: blur(10px);
        }

        /* --- DASHBOARD PAGE --- */
        #dashboard-page { display: none; } 
        .sidebar { 
            background: var(--kse-dark); height: 100vh; color: white; padding: 2rem 1.2rem;
            position: fixed; width: var(--sidebar-width); z-index: 1000; display: flex; flex-direction: column;
        }
        .main-content { margin-left: var(--sidebar-width); padding: 2.5rem; min-height: 100vh; }
        
        .nav-link { 
            color: rgba(255,255,255,0.7); margin-bottom: 0.2rem; border-radius: 0.75rem; 
            padding: 0.8rem 1.2rem; transition: all 0.3s; text-decoration: none; display: flex; align-items: center;
        }
        .nav-link:hover, .nav-link.active { background: rgba(255,255,255,0.1); color: var(--kse-accent); }
        .submenu { padding-left: 1.5rem; margin-bottom: 0.5rem; }

        .welcome-banner {
            background: linear-gradient(135deg, var(--kse-dark) 0%, var(--kse-primary) 100%);
            color: white; padding: 3.5rem; border-radius: 1.5rem; margin-bottom: 1.5rem; position: relative; overflow: hidden;
        }

        /* --- TABLE STYLE PER SCREENSHOT --- */
        .history-card { background: white; border-radius: 1rem; padding: 0; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        
        .table thead { background-color: #1a3a5a; color: #7cb5ec; }
        .table thead th { border: none; padding: 15px; font-size: 0.75rem; text-transform: uppercase; font-weight: 700; }
        
        .table tbody td { padding: 15px; vertical-align: middle; border-bottom: 1px solid #eee; font-size: 0.85rem; }
        
        .badge-identitas { 
            background-color: var(--kse-orange); color: black; font-weight: 800; 
            padding: 4px 10px; border-radius: 6px; font-size: 0.7rem; display: inline-block; margin-bottom: 4px;
        }
        .date-text { color: #888; font-size: 0.8rem; display: block; }
        .doc-number { font-weight: 700; color: #333; }
        .btn-view { 
            border: 1px solid #3498db; color: #3498db; background: white; 
            padding: 5px 12px; border-radius: 6px; font-size: 0.75rem; font-weight: 600; transition: 0.3s;
        }
        .btn-view:hover { background: #3498db; color: white; }

        .bg-gray-row { background-color: #d1d5db !important; width: 100px; }
        .btn-kse { background: var(--kse-dark); color: white; padding: 0.8rem; border-radius: 0.75rem; border: none; font-weight: 600; width: 100%; }
    </style>
</head>
<body>

<div id="login-page">
    <div class="login-card text-center shadow">
        <div id="qrcode" class="d-flex justify-content-center mb-4"></div>
        <h2 class="fw-bold mb-4" style="color: var(--kse-dark);">Admin Login</h2>
        <div class="text-start mb-3">
            <input type="text" id="user" class="form-control form-control-lg" placeholder="Username">
        </div>
        <div class="text-start mb-4">
            <input type="password" id="pass" class="form-control form-control-lg" placeholder="Password">
        </div>
        <button class="btn-kse" onclick="handleLogin()">Login</button>
        <p id="error-msg" class="text-danger mt-3 small fw-bold" style="display:none;">Akses Ditolak!</p>
    </div>
</div>

<div id="dashboard-page">
    <aside class="sidebar">
        <div class="mb-4 px-3">
            <h4 class="fw-bold"><i class="bi bi-cpu-fill text-success"></i> KSE-SYSTEM</h4>
        </div>
        <nav class="d-flex flex-column h-100">
            <a href="#" class="nav-link active"><i class="bi bi-grid-fill me-2"></i> Dashboard</a>
            <p class="text-uppercase small fw-bold opacity-50 px-3 mt-4 mb-2">E-Documents</p>
            <div class="submenu">
                <a href="surat_jalan.html" class="nav-link"><i class="bi bi-truck me-2"></i> Surat Jalan</a>
                <a href="memo_pengaliran.html" class="nav-link"><i class="bi bi-sticky me-2"></i> Memo Pengaliran</a>
            </div>
            <a href="javascript:void(0)" onclick="handleLogout()" class="nav-link text-danger mt-auto">
                <i class="bi bi-box-arrow-left me-2"></i> Sign Out
            </a>
        </nav>
    </aside>

    <main class="main-content">
        <div class="welcome-banner">
            <h1 class="fw-bold">Welcome Admin</h1>
            <p class="lead opacity-75">Integrated Documentation History</p>
        </div>

        <div class="history-card mb-5">
            <div class="table-responsive">
                <table class="table align-middle m-0">
                    <thead>
                        <tr>
                            <th>IDENTITAS & TANGGAL</th>
                            <th>NOMOR DOKUMEN</th>
                            <th>JENIS</th>
                            <th>TUJUAN</th>
                            <th>NAMA SOPIR</th>
                            <th>NO. POLISI</th>
                            <th>QTY (L)</th>
                            <th class="text-center">AKSI</th>
                        </tr>
                    </thead>
                    <tbody id="history-data">
                        <tr><td colspan="8" class="text-center py-5">Menghubungkan ke data_logistik...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<script>
    const SUPABASE_URL = 'https://ntaectphgoelmhzrkatp.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im50YWVjdHBoZ29lbG1oenJrYXRwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NzExNDYsImV4cCI6MjA4ODE0NzE0Nn0.-8E98wpkzHBARRhW6PKhBtf2XKhWFjq7idAzw9jlcKg';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    window.onload = function() {
        new QRCode(document.getElementById("qrcode"), { text: "KSE-AUTH", width: 45, height: 45 });
        if (localStorage.getItem('kse_session') === 'active') { showDashboard(); loadMonthlyHistory(); }
    };

    function handleLogin() {
        if(document.getElementById('user').value === "admin" && document.getElementById('pass').value === "kse123") {
            localStorage.setItem('kse_session', 'active');
            showDashboard(); loadMonthlyHistory();
        } else { document.getElementById('error-msg').style.display = 'block'; }
    }

    function handleLogout() { localStorage.removeItem('kse_session'); location.reload(); }
    function showDashboard() { 
        document.getElementById('login-page').style.display = 'none'; 
        document.getElementById('dashboard-page').style.display = 'block'; 
    }

    async function loadMonthlyHistory() {
        const table = document.getElementById('history-data');
        try {
            // Mengambil data dari tabel data_logistik
            const { data, error } = await supabaseClient
                .from('data_logistik')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) throw error;

            if (!data || data.length === 0) {
                table.innerHTML = `<tr><td colspan="8" class="text-center py-4">Data tidak ditemukan.</td></tr>`;
                return;
            }

            table.innerHTML = data.map(doc => `
                <tr>
                    <td>
                        <span class="badge-identitas">PT. KHATULISTIWA SINAR ENERGI</span>
                        <span class="date-text">${doc.created_at ? doc.created_at.split('T')[0] : '-'}</span>
                    </td>
                    <td class="doc-number">${doc.no_dokumen || doc.doc_number || '-'}</td>
                    <td class="bg-light text-uppercase" style="font-size: 0.75rem; font-weight: 600;">${doc.jenis || '-'}</td>
                    <td style="max-width: 200px; font-size: 0.8rem;">${doc.tujuan || '-'}</td>
                    <td class="fw-bold">${doc.nama_sopir || doc.driver_name || '-'}</td>
                    <td class="font-monospace">${doc.no_polisi || doc.nopol || '-'}</td>
                    <td class="fw-bold text-end">${Number(doc.qty || 0).toLocaleString('id-ID')}</td>
                    <td class="text-center">
                        <button class="btn-view" onclick="openPDF('${doc.pdf_url || doc.url_pdf}')">
                            <i class="bi bi-file-earmark-pdf"></i> VIEW
                        </button>
                    </td>
                </tr>
            `).join('');

        } catch (err) {
            table.innerHTML = `<tr><td colspan="8" class="text-center text-danger py-4">Error: ${err.message}</td></tr>`;
        }
    }

    // Fungsi perbaikan buka PDF
    function openPDF(url) {
        if (!url || url === 'undefined' || url === '#') {
            alert('File PDF tidak tersedia untuk dokumen ini.');
        } else {
            window.open(url, '_blank');
        }
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
